      <line id="hour" x1="0" y1="50" x2="0" y2="-268" stroke="blue"
        stroke-width="9" transform="rotate(0)" />
      <line id="minute" x1="0" y1="50" x2="0" y2="-400" stroke="white"
        stroke-width="7" transform="rotate(0)"/>
      <line id="second" x1="0" y1="50" x2="0" y2="-400" stroke="red"
        transform="rotate(0)"/>
      <circle cx="0" cy="0" r="10" fill="black" />
    </g>
  </g>
  <script>
    function update() {
      var now = new Date(Date.now());
      var milliRotation = 360 * now.getMilliseconds() / 1000;
      var secondRotation = (360 * now.getSeconds() + milliRotation) / 60;
      document.getElementById("second")
        .setAttribute("transform", "rotate(" + secondRotation.toString() + ")");
      var minuteRotation = (360 * now.getMinutes() + secondRotation) / 60;
      document.getElementById("minute")
        .setAttribute("transform", "rotate(" + minuteRotation.toString() + ")");
      var hourRotation = (360 * (now.getHours() % 12) + minuteRotation) / 12;
      document.getElementById("hour").setAttribute("transform",
        "rotate(" + hourRotation.toString() + ")");
    }
    update();
    setInterval(update, 20);
  </script>
</svg>
